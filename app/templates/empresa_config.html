{% extends "base.html" %}
{% block title %}Configuracion/Empresa{% endblock %}
{% block content %}

<h2 class="mb-4">🏢 Configuración de Empresa</h2>

<h5 class="mb-4">🌐 Tu IP actual: {{ ip_actual }}</h5>

<a href="{{ url_for('sucursales.lista_sucursales') }}"
           class="btn btn-success w-100 p-3">Sucursales</a>
<div class="card shadow-sm">
    <div class="card-body">

        <form method="post">

            <div class="mb-3">
                <label class="form-label">Nombre de la empresa</label>
                <input type="text"
                       name="nombre"
                       class="form-control"
                       value="{{ empresa.nombre }}"
                       required>
            </div>

            <hr>
<!--
            <h5 class="mb-3">🔐 Seguridad de red</h5>

                       name="ip_publica"
                       class="form-control"
                       placeholder="Ej: 181.45.22.10"
                       value="{{ empresa.ip_publica or '' }}">
                <small class="text-muted">
                    Usar si la empresa tiene IP fija
                </small>
            </div>

            <div class="mb-3">
                <label class="form-label">Rango IP permitido (CIDR)</label>
                <input type="text"
                       name="ip_rango"
                       class="form-control"
                       placeholder="Ej: 181.45.22.0/24"
                       value="{{ empresa.ip_rango or '' }}">

                </small>

                Guardar configuración
            </button>

        </form>

    </div>
</div>

{% endblock %}
