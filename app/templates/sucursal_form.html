{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <h2>
        {% if sucursal %}
            Editar Sucursal
        {% else %}
            Nueva Sucursal
        {% endif %}
    </h2>

    <form method="POST" class="mt-4">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text"
                   name="nombre"
                   class="form-control"
                   value="{{ sucursal.nombre if sucursal else '' }}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">IP Pública</label>
            <input type="text"
                   name="ip_publica"
                   class="form-control"
                   value="{{ sucursal.ip_publica if sucursal else '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Rango CIDR</label>
            <input type="text"
                   name="ip_rango"
                   class="form-control"
                   value="{{ sucursal.ip_rango if sucursal else '' }}">
        </div>

        <div class="d-flex justify-content-between">
            <a href="{{ url_for('sucursales.lista_sucursales') }}"
               class="btn btn-secondary">
                Cancelar
            </a>

            <button type="submit" class="btn btn-primary">
                Guardar
            </button>
        </div>

    </form>

</div>
{% endblock %}
