{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">👤 Usuarios de la empresa</h2>

<a href="{{ url_for('usuarios.nuevo_usuario') }}" class="btn btn-success mb-3">
    ➕ Nuevo usuario
</a>

<table class="table table-striped">
    <thead class="table-dark">
        <tr>
            <th>Email</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Editar</th>
            <th>Password</th>
        </tr>
    </thead>

    <tbody>
        {% for u in usuarios %}
        <tr>
            <td>{{ u.email }}</td>
            <td>{{ u.rol }}</td>
            <td>
                {% if u.activo %}
                    <span class="badge bg-success">Activo</span>
                {% else %}
                    <span class="badge bg-secondary">Inactivo</span>
                {% endif %}
            </td>
            <td class="d-flex gap-2">
                <a href="{{ url_for('usuarios.editar_usuario', id=u.id) }}"
                   class="btn btn-sm btn-outline-secondary">
                   Editar
                </a>

                <a href="{{ url_for('usuarios.toggle_usuario', id=u.id) }}"
                   class="btn btn-sm btn-outline-primary">
                   Activar / Desactivar
                </a>
            </td>
            <td><form method="POST" action="/usuarios/reset-password/{{ u.id }}" style="display:inline;">
    <input type="password" name="nueva_password" placeholder="Nueva contraseña"
           class="form-control form-control-sm d-inline w-50" required>
    <button class="btn btn-sm btn-danger">Reset</button>
</form></td>

        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
