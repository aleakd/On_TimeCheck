{% extends "base.html" %}

{% block content %}

<h3>👤 Nuevo usuario</h3>

<form method="post" class="card shadow-sm p-4">

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Rol</label>
        <select name="rol" id="rol" class="form-select" required>
            <option value="">Seleccione</option>
            <option value="admin">Administrador</option>
            <option value="supervisor">Supervisor</option>
            <option value="empleado">Empleado</option>
        </select>
    </div>

    <!-- 👇 SELECT EMPLEADO (SOLO PARA ROL EMPLEADO) -->
    <div class="mb-3" id="empleado-box" style="display:none;">
    <label class="form-label">Empleado vinculado</label>

    <select name="empleado_id" class="form-select"
        {% if request.args.get('empleado_id') %}disabled{% endif %}>

        <option value="">Seleccione empleado</option>
        {% for e in empleados %}
            <option value="{{ e.id }}"
                {% if request.args.get('empleado_id')|int == e.id %}selected{% endif %}>
                {{ e.apellido }}, {{ e.nombre }}
            </option>
        {% endfor %}
    </select>

    {% if request.args.get('empleado_id') %}
        <input type="hidden" name="empleado_id" value="{{ request.args.get('empleado_id') }}">
    {% endif %}

    <div class="form-text">
        Obligatorio para todos los roles excepto ADMIN
    </div>
</div>


    <button class="btn btn-primary w-100">
        Crear usuario
    </button>

</form>

<script>
const rolSelect = document.getElementById('rol');
const empleadoBox = document.getElementById('empleado-box');

function toggleEmpleado() {
    if (rolSelect.value !== 'admin') {
        empleadoBox.style.display = 'block';
    } else {
        empleadoBox.style.display = 'none';
    }
}

// ejecutar al cargar
toggleEmpleado();

// cambiar dinámicamente
rolSelect.addEventListener('change', toggleEmpleado);

// 👇 si viene desde empleado (query param)
if ({{ request.args.get('empleado_id') is not none | tojson }}) {
    rolSelect.value = "empleado";
    empleadoBox.style.display = "block";
}
</script>

{% endblock %}
